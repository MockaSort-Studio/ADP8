name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "**/*.md"

jobs:
  build-main:
    runs-on: ubuntu-latest
    env:
      BUILD_BUDDY_KEY: ${{ secrets.BUILD_BUDDY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup_environment
      - uses: MockaSort-Studio/actions/.github/actions/build-bazel@main
        with:
          targets: //...
          config: main
