#### Do not edit below unless you know what you are doing ####
site_name: ADP8
site_url: https://mockasort-studio.github.io/ADP8/
site_description: Yet Another Autonomy Stack
site_author: MockaSort-Studio
docs_dir: docs
exclude_docs: HOWTO.md

theme:
  name: material
  favicon: images/favicon.png
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    scheme: slate
    primary: pink
    accent: deep orange
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - content.code.copy
    - toc.follow

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
################################################################

nav:
  - Home: index.md
  - Javelina-RT:
    - Overview: javelina-rt/index.md
    - End-to-End Example: javelina-rt/example.md
    - Lifecycle: javelina-rt/lifecycle.md
    - Communication: javelina-rt/communication.md
    - Support: javelina-rt/support.md
    - Generators: javelina-rt/generators.md
    - Versions:
      - Humble Desert Pork: javelina-rt/humble-desert-pork.md
  - Code of Conduct: CODE_OF_CONDUCT.md
  - Contributing: CONTRIBUTING.md
